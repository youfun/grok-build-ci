name: Build macOS (Apple Silicon)

on:
  push:
    branches: [main]
  schedule:
    # Daily rebuild from latest source (UTC)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Source repository (owner/name)"
        required: true
        default: "xai-org/grok-build"
      source_ref:
        description: "Branch, tag, or commit SHA"
        required: true
        default: "main"

concurrency:
  group: macos-build-${{ github.workflow }}-${{ github.event.inputs.source_repo || 'xai-org/grok-build' }}-${{ github.event.inputs.source_ref || 'main' }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build aarch64-apple-darwin
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Resolve source
        id: src
        run: |
          REPO="${{ github.event.inputs.source_repo }}"
          REF="${{ github.event.inputs.source_ref }}"
          if [ -z "$REPO" ]; then REPO="xai-org/grok-build"; fi
          if [ -z "$REF" ]; then REF="main"; fi
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Building $REPO@$REF"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.src.outputs.repo }}
          ref: ${{ steps.src.outputs.ref }}
          path: src

      - name: Install Rust (respect rust-toolchain.toml)
        working-directory: src
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup show
          rustc --version
          cargo --version

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src
          shared-key: macos-aarch64-pager
          cache-on-failure: true

      - name: Install DotSlash
        run: |
          cargo install dotslash --locked
          command -v dotslash
          /usr/bin/env dotslash --help >/dev/null

      - name: Verify protoc via bin/protoc (DotSlash)
        working-directory: src
        run: ./bin/protoc --version

      - name: Build release binary
        working-directory: src
        env:
          CARGO_TERM_COLOR: always
        run: cargo build -p xai-grok-pager-bin --release

      - name: Package artifact
        working-directory: src
        run: |
          mkdir -p dist
          cp target/release/xai-grok-pager dist/grok
          chmod +x dist/grok
          file dist/grok
          ./dist/grok --version || true
          ls -lh dist/grok
          # Record provenance for the artifact download page
          {
            echo "source_repo=${{ steps.src.outputs.repo }}"
            echo "source_ref=${{ steps.src.outputs.ref }}"
            echo "source_sha=$(git rev-parse HEAD)"
            echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > dist/BUILD_INFO.txt
          cat dist/BUILD_INFO.txt

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: grok-macos-aarch64-${{ github.run_id }}
          path: |
            src/dist/grok
            src/dist/BUILD_INFO.txt
          if-no-files-found: error
          retention-days: 14
